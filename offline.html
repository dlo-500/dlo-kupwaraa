<style>

    background:#C9A84C;color:#0D1B2A;border:none;border-radius:8px;padding:12px 24px;

  }

</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5">
    <path d="M1 9a16 16 0 0122 0M5 13a10 10 0 0114 0M9 17a4 4 0 016 0"/><line x1="2" y1="2" x2="22" y2="22"/>
  </svg>
